name: Lint Code

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install

      - name: Fix executable permissions
        run: chmod +x node_modules/.bin/eslint node_modules/.bin/stylelint node_modules/.bin/htmlhint

      - run: npm run lint